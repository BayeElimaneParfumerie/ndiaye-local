<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Légumineuses - NDIAYE LOCAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: { darkgreen: '#1b4d3e', green: '#2d6a4f', lightgreen: '#d8f3dc', orange: '#e65100', terracotta: '#d85a38', lightbg: '#fcfbf7' } } } }
        }
    </script>
</head>
<body class="bg-brand-lightbg font-jakarta text-slate-800 antialiased min-h-screen flex flex-col">

    <nav class="bg-white border-b border-stone-200 shadow-sm h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-4 w-full flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-2">
                <i class="fa-solid fa-arrow-left text-brand-darkgreen"></i>
                <span class="font-bold text-sm text-brand-darkgreen">Retour</span>
            </a>
            <span class="font-playfair font-black text-xl text-brand-darkgreen">NDIAYE LOCAL</span>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 pt-12 text-center">
        <h1 class="font-playfair text-3xl sm:text-4xl font-extrabold text-brand-darkgreen">Légumineuses</h1>
        <div class="w-12 h-1 bg-brand-orange mx-auto mt-4 rounded-full"></div>
    </div>

    <main class="max-w-7xl mx-auto px-4 py-12 flex-grow grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
        <!-- PRODUIT : NIEBE BLANC -->
        <div class="bg-white rounded-2xl border border-stone-200 shadow-sm p-6">
            <div class="text-center mb-6">
                <div class="w-20 h-20 bg-brand-lightgreen rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">🫘</div>
                <h3 class="font-playfair text-xl font-bold">Niébé Blanc</h3>
            </div>
            <select id="size-niebe" class="w-full bg-stone-50 border p-2.5 rounded-xl text-sm font-semibold">
                <option value="1kg - 1 300 FCFA">1kg — 1 300 FCFA</option>
                <option value="5kg - 6 200 FCFA">5kg — 6 200 FCFA</option>
            </select>
            <button onclick="orderWhatsApp('Niébé Blanc', 'size-niebe')" class="w-full mt-4 py-3 bg-brand-green text-white font-bold text-sm rounded-xl hover:bg-brand-darkgreen transition">Commander</button>
        </div>
        <!-- PRODUIT : FARINE NIEBE -->
        <div class="bg-white rounded-2xl border border-stone-200 shadow-sm p-6">
            <div class="text-center mb-6">
                <div class="w-20 h-20 bg-brand-lightgreen rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">🌾</div>
                <h3 class="font-playfair text-xl font-bold">Farine de Niébé</h3>
            </div>
            <select id="size-farine" class="w-full bg-stone-50 border p-2.5 rounded-xl text-sm font-semibold">
                <option value="500g - 1 000 FCFA">500g — 1 000 FCFA</option>
                <option value="1kg - 1 900 FCFA">1kg — 1 900 FCFA</option>
            </select>
            <button onclick="orderWhatsApp('Farine de Niébé', 'size-farine')" class="w-full mt-4 py-3 bg-brand-green text-white font-bold text-sm rounded-xl hover:bg-brand-darkgreen transition">Commander</button>
        </div>
    </main>

    <script>
        function orderWhatsApp(name, selectId) {
            const format = document.getElementById(selectId).value;
            const text = `Bonjour NDIAYE LOCAL ! Je souhaite commander : *${name}* (${format}).`;
            window.open(`https://wa.me/221778688830?text=${encodeURIComponent(text)}`, '_blank');
        }
    </script>
</body>
</html>
